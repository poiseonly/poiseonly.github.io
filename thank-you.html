<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | 24th Avenue</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', serif;
        }
        body {
            background-color: #faf7f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .thank-you-box {
            background: white;
            padding: 4rem;
            border-radius: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: 20px;
        }
        h1 {
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 1rem;
            color: #1a1a1a;
        }
        h1 span {
            color: #b89b7b;
            font-style: italic;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #4a4a4a;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 1rem 3rem;
            background: #b89b7b;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background: #8b7a66;
        }
    </style>
</head>
<body>
    <div class="thank-you-box">
        <h1>Thank <span>You!</span></h1>
        <p>We've received your message and will get back to you within 24-48 hours.</p>
        <a href="https://poiseonly.github.io/" class="btn">Return to Home</a>
    </div>
</body>
</html>
