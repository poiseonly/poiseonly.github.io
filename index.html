<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>29thavenuedesigns | Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
        background-color: #ffffff;
        color: #1a1a1a;
        line-height: 1.5;
    }

    /* Mobile First Navigation */
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 1.2rem;
        background: #ffffff;
        border-bottom: 1px solid #f0f0f0;
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .logo {
        font-size: 1.1rem;
        font-weight: 500;
        letter-spacing: 0.3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 180px;
    }

    .menu-icon {
        font-size: 1.5rem;
        cursor: pointer;
        flex-shrink: 0;
    }

    /* Desktop Navigation */
    .desktop-nav {
        display: flex;
        gap: 2rem;
        align-items: center;
    }

    .desktop-nav a {
        text-decoration: none;
        color: #1a1a1a;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        white-space: nowrap;
    }

    /* Mobile Menu */
    .mobile-menu {
        position: fixed;
        top: 0;
        left: -100%;
        width: 85%;
        height: 100vh;
        background: #ffffff;
        z-index: 2000;
        padding: 2rem 1.5rem;
        transition: 0.3s ease;
        box-shadow: 2px 0 20px rgba(0,0,0,0.1);
        overflow-y: auto;
    }

    .mobile-menu.active {
        left: 0;
    }

    .close-menu {
        text-align: right;
        font-size: 1.8rem;
        margin-bottom: 2rem;
        cursor: pointer;
    }

    .mobile-menu-links {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .mobile-menu-links a {
        text-decoration: none;
        color: #1a1a1a;
        font-size: 1.2rem;
        font-weight: 400;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-bottom: 1px solid #f0f0f0;
        padding-bottom: 0.8rem;
    }

    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 1500;
        display: none;
    }

    .overlay.active {
        display: block;
    }

    /* Hero Section REMOVED COMPLETELY */

    /* Fading Gallery Section - Now starts right after nav */
    .gallery-section {
        width: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
    }

    .slideshow-container {
        position: relative;
        width: 100%;
        height: calc(100vh - 60px); /* Full viewport height minus nav */
        min-height: 400px;
        overflow: hidden;
    }

    .slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 2s ease-in-out; /* Smoother 2-second fade */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    .slide.active {
        opacity: 1;
        z-index: 1;
    }

    /* Slide images */
    .slide-1 { background-image: url('https://poiseonly.github.io/images/ABA03F76-E5F0-4C0B-9D76-8D5719B46F5D.CR2'); }
    .slide-2 { background-image: url('https://poiseonly.github.io/images/IMG_3290.JPG.jpeg'); }
    .slide-3 { background-image: url('https://poiseonly.github.io/images/IMG_3279.JPG.jpeg'); }
    .slide-4 { background-image: url('https://poiseonly.github.io/images/IMG_3265.JPG.jpeg'); }
    .slide-5 { background-image: url('https://poiseonly.github.io/images/IMG_9366.JPG.jpeg'); }
    .slide-6 { background-image: url('https://poiseonly.github.io/images/00AA9908-79C2-47EE-A4C3-0B20DC0B2F49.CR2'); }
    .slide-7 { background-image: url('https://poiseonly.github.io/images/IMG_9463.JPG.jpeg'); }

    /* Subtle overlay removed for cleaner look */

    /* Footer - Now touching the image directly */
    .footer {
        background: #1a1a1a;
        color: #ffffff;
        padding: 2rem 1.5rem;
        text-align: center;
        margin-top: 0; /* Remove margin so it touches the image */
        width: 100%;
    }

    .footer-logo {
        font-size: 1.5rem;
        font-weight: 300;
        margin-bottom: 0.8rem;
        color: #ffffff;
        word-break: break-word;
    }

    .footer-email {
        font-size: 0.95rem;
        color: #b89b7b;
        text-decoration: none;
        display: inline-block;
        margin-bottom: 1rem;
        border-bottom: 1px solid #b89b7b;
        padding-bottom: 3px;
        word-break: break-word;
    }

    .footer-links {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 1rem;
        margin: 1rem 0;
    }

    .footer-links a {
        color: #ffffff;
        text-decoration: none;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .footer-social {
        display: flex;
        justify-content: center;
        gap: 1.2rem;
        margin: 1rem 0;
    }

    .footer-social a {
        color: #ffffff;
        font-size: 1.1rem;
    }

    .footer-copyright {
        font-size: 0.7rem;
        color: #888;
        margin-top: 1.5rem;
        line-height: 1.4;
    }

    /* Desktop Styles */
    @media (min-width: 768px) {
        .navbar {
            padding: 1.5rem 3rem;
        }
        
        .logo {
            font-size: 1.3rem;
            max-width: none;
        }
        
        .menu-icon {
            display: none;
        }
        
        .mobile-menu, .overlay {
            display: none;
        }
        
        .desktop-nav {
            display: flex !important;
            gap: 2.5rem;
            align-items: center;
        }
        
        .desktop-nav a {
            display: inline-block;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        
        /* Full viewport height slideshow on desktop */
        .slideshow-container {
            height: calc(100vh - 80px); /* Adjust for taller nav on desktop */
            min-height: 600px;
        }
        
        .footer-logo {
            font-size: 1.8rem;
        }
        
        .footer-email {
            font-size: 1.1rem;
        }
        
        .footer-links a {
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        
        .footer-social a {
            font-size: 1.3rem;
        }
        
        .footer-copyright {
            font-size: 0.8rem;
        }
    }

    @media (max-width: 767px) {
        .desktop-nav {
            display: none;
        }
        
        .slideshow-container {
            height: calc(100vh - 60px); /* Full height minus mobile nav */
        }
    }
    </style>
</head>
<body>
    <!-- Navigation - UNCHANGED -->
    <nav class="navbar">
        <div class="logo">29thavenuedesigns</div>
        <div class="menu-icon" onclick="openMenu()"><i class="fas fa-bars"></i></div>
        <div class="desktop-nav">
            <a href="index.html">HOME</a>
            <a href="studio.html">STUDIO</a>
            <a href="founder.html">FOUNDER</a>
            <a href="process.html">OUR PROCESS</a>
            <a href="work.html">PORTFOLIO</a>
            <a href="contact.html">CONTACT</a>
        </div>
    </nav>

    <!-- Mobile Menu - UNCHANGED -->
    <div class="mobile-menu" id="mobileMenu">
        <div class="close-menu" onclick="closeMenu()"><i class="fas fa-times"></i></div>
        <div class="mobile-menu-links">
            <a href="index.html" onclick="closeMenu()">HOME</a>
            <a href="studio.html" onclick="closeMenu()">STUDIO</a>
            <a href="founder.html" onclick="closeMenu()">FOUNDER</a>
            <a href="process.html" onclick="closeMenu()">OUR PROCESS</a>
            <a href="work.html" onclick="closeMenu()">PORTFOLIO</a>
            <a href="contact.html" onclick="closeMenu()">CONTACT</a>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="closeMenu()"></div>

    <!-- HERO SECTION COMPLETELY REMOVED - Images start right after nav -->

    <!-- Pure Fading Gallery - No dots, no text, just images -->
    <section class="gallery-section">
        <div class="slideshow-container" id="slideshow">
            <div class="slide slide-1 active"></div>
            <div class="slide slide-2"></div>
            <div class="slide slide-3"></div>
            <div class="slide slide-4"></div>
            <div class="slide slide-5"></div>
            <div class="slide slide-6"></div>
            <div class="slide slide-7"></div>
        </div>
    </section>

    <!-- Footer - Directly touching the images with no space -->
    <footer class="footer">
        <div class="footer-logo">29thavenuedesigns</div>
        <a href="mailto:moyorpoise@gmail.com" class="footer-email">moyorpoise@gmail.com</a>
        <p style="margin-bottom: 1rem; font-size: 0.9rem;">Lagos, Nigeria</p>
        <div class="footer-links">
            <a href="index.html">HOME</a>
            <a href="studio.html">STUDIO</a>
            <a href="founder.html">FOUNDER</a>
            <a href="process.html">OUR PROCESS</a>
            <a href="work.html">PORTFOLIO</a>
            <a href="contact.html">CONTACT</a>
        </div>
        <div class="footer-social">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-pinterest"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
        </div>
        <div class="footer-copyright">
            ©️ 2026 29thavenuedesigns STUDIO. ALL RIGHTS RESERVED.
        </div>
    </footer>

    <script>
        function openMenu() {
            document.getElementById('mobileMenu').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }
        
        function closeMenu() {
            document.getElementById('mobileMenu').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        // Clean, infinite slideshow with smooth transitions
        let slideIndex = 0;
        const slides = document.getElementsByClassName('slide');
        let slideInterval;

        function showSlide(n) {
            // Hide all slides
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove('active');
            }
            
            // Show the selected slide
            slides[n].classList.add('active');
            slideIndex = n;
        }

        function nextSlide() {
            slideIndex = (slideIndex + 1) % slides.length;
            showSlide(slideIndex);
        }

        // Start the infinite slideshow
        showSlide(0);
        
        // Change image every 5 seconds for a more relaxed viewing experience
        slideInterval = setInterval(nextSlide, 5000);

        // Optional: pause on hover (remove if you want it to always run)
        const slideshow = document.getElementById('slideshow');
        slideshow.addEventListener('mouseenter', () => {
            clearInterval(slideInterval);
        });

        slideshow.addEventListener('mouseleave', () => {
            slideInterval = setInterval(nextSlide, 5000);
        });
    </script>
</body>
</html>
